services:
  database:
    container_name: retail-suite-postgres
    image: docker.io/postgres:17
    ports:
      - "${DB_EXPOSE_PORT:-5432}:${DB_EXPOSE_PORT:-5432}"
    environment:
      - POSTGRES_USER=${PG_USER:-dev}
      - POSTGRES_PASSWORD=${PG_PASSWORD:-dev}
      - POSTGRES_DATABASE=${PG_DATABASE:-dev}
    volumes:
      # - ./docker/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      # - ./docker/postgres/conf.d:/etc/postgresql/conf.d
      - postgres-data:/var/lib/postgresql/data
    restart: "unless-stopped"
    healthcheck:
      test: ["CMD"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - retail-suite

  cache:
    container_name: retail-suite-valkey
    image: docker.io/valkey/valkey:9.0.3
    ports:
      - "${CACHE_EXPOSE_PORT:-6379}:${CACHE_EXPOSE_PORT:-6379}"
    environment:
      - VALKEY_PASSWORD=${VALKEY_PASSWORD:-dev}
      - VALKEY_DATABASE=${VALKEY_DB_INDEX:-0}
    volumes:
      # - ./docker/valkey/valkey.conf:/usr/local/etc/valkey/valkey.conf:ro
      - valkey-data:/valkey/valkey/data
    restart: "unless-stopped"
    networks:
      - retail-suite

volumes:
  postgres-data:
  valkey-data:

networks:
  retail-suite:
    driver: bridge
    name: retail-suite-net
